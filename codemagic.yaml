workflows:
  gym-app-simulator-build:
    name: GymApp Simulator Test Build
    max_build_duration: 60
    instance_type: mac_mini_m1
    environment:
      vars:
        XCODE_WORKSPACE: "GymApp.xcodeproj"
        XCODE_SCHEME: "GymApp"
      xcode: latest
      cocoapods: default
    triggering:
      events:
        - push
      branch_patterns:
        - pattern: main
          include: true
    scripts:
      - name: Install XcodeGen
        script: |
          brew install xcodegen

      - name: Generate Xcode project from project.yml
        script: |
          xcodegen generate

      - name: Resolve Swift Package dependencies
        script: |
          xcodebuild -resolvePackageDependencies -project "$XCODE_WORKSPACE"

      - name: Build for iOS Simulator (local ad-hoc signing)
        script: |
          xcodebuild build \
            -project "$XCODE_WORKSPACE" \
            -scheme "$XCODE_SCHEME" \
            -sdk iphonesimulator \
            -destination 'generic/platform=iOS Simulator' \
            CODE_SIGN_IDENTITY="-" \
            CODE_SIGNING_REQUIRED=NO \
            CODE_SIGNING_ALLOWED=YES \
            -derivedDataPath build/DerivedData

      - name: Zip the .app for download
        script: |
          cd build/DerivedData/Build/Products/Debug-iphonesimulator
          APP_PATH=$(find . -maxdepth 1 -name "*.app")
          zip -r "$CM_BUILD_DIR/GymApp-simulator.zip" "$APP_PATH"

    artifacts:
      - GymApp-simulator.zip
      - /tmp/xcodebuild_logs/*.log

    publishing:
      email:
        recipients:
          - your-email@example.com
        notify:
          success: true
          failure: true
